<div class="registration-wrapper d-flex align-items-center justify-content-center py-5 px-3">
  <div class="card border-0 shadow-2xl overflow-hidden" style="max-width: 1100px; width: 100%">
    <div class="row g-0">
      
      <div class="col-lg-4 d-none d-lg-flex flex-column justify-content-center text-white p-5 bg-gradient-blue text-center">
        <div class="icon-circle mb-4 mx-auto">
          <i class="bi bi-shield-check display-4"></i>
        </div>
        <h3 class="fw-bold">Student Portal</h3>
        <p class="opacity-75 small">Secure registration for the 2026 Academic Year.</p>
      </div>

      <div class="col-lg-8 bg-white p-4 p-md-5">
        <div class="mb-4">
          <h2 class="fw-bold text-dark mb-1">Create Account</h2>
          <p class="text-muted small text-uppercase fw-semibold letter-spacing-1">Personal Details</p>
        </div>

        <form [formGroup]="registerForm" (ngSubmit)="onRegister()">
          <div class="row g-4">
            
            <div class="col-md-6">
              <label class="form-label small fw-bold">First Name</label>
              <div class="input-group custom-input-group">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input type="text" formControlName="std_f_name" class="form-control" placeholder="First Name">
              </div>
            </div>

            <div class="col-md-6">
              <label class="form-label small fw-bold">Last Name</label>
              <div class="input-group custom-input-group">
                <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                <input type="text" formControlName="std_l_name" class="form-control" placeholder="Last Name">
              </div>
            </div>

            <div class="col-md-4">
              <label class="form-label small fw-bold">Age</label>
              <div class="input-group custom-input-group">
                <span class="input-group-text"><i class="bi bi-calendar-event"></i></span>
                <input type="number" formControlName="std_age" class="form-control" placeholder="Age">
              </div>
            </div>
           <div class="col-md-2"></div>
            <div class="col-md-6">
              <label class="form-label small fw-bold">Date of Birth</label>
              <div class="input-group custom-input-group">
                <span class="input-group-text"><i class="bi bi-calendar3"></i></span>
                <input type="date" formControlName="std_dob" class="form-control">
              </div>
            </div>

            <div class="col-md-6">
              <label class="form-label small fw-bold">Gender</label>
              <div class="input-group custom-input-group">
                <span class="input-group-text"><i class="bi bi-gender-ambiguous"></i></span>
                <select formControlName="std_gender" class="form-select">
                  <option value="">Select Gender</option>
                  <option value="Male">Male</option>
                  <option value="Female">Female</option>
                </select>
              </div>
            </div>

            <div class="col-md-6">
              <label class="form-label small fw-bold">Phone Number</label>
              <div class="input-group custom-input-group">
                <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                <input type="text" formControlName="std_phno" class="form-control" placeholder="10-digit mobile">
              </div>
            </div>

            <div class="col-6">
              <label class="form-label small fw-bold">Username (Email)</label>
              <div class="input-group custom-input-group">
                <span class="input-group-text"><i class="bi bi-envelope-at"></i></span>
                <input type="email" formControlName="std_email_id" class="form-control" placeholder="email@school.com">
              </div>
            </div>

            <div class="col-6">
              <label class="form-label small fw-bold">Password</label>
              <div class="input-group custom-input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" formControlName="std_usr_paswrd" class="form-control" placeholder="••••••••">
              </div>
            </div>

          </div>

          <div class="mt-5 qualification-section p-4 rounded-4 bg-light border">
            <div class="d-flex justify-content-between align-items-center mb-4">
              <h6 class="fw-bold text-dark m-0"><i class="bi bi-book me-2 text-primary"></i>Academic History</h6>
              <button type="button" class="btn btn-primary btn-sm rounded-pill px-3 shadow-sm" (click)="addQualification()">
                <i class="bi bi-plus-lg me-1"></i> Add Course
              </button>
            </div>

            <div class="table-responsive">
              <table class="table table-borderless align-middle custom-table">
                <thead>
                  <tr class="text-muted small text-uppercase">
                    <th>Course Name</th>
                    <th>Year</th>
                    <th>Result (%)</th>
                    <th class="text-center">Action</th>
                  </tr>
                </thead>
                <tbody formArrayName="qualifications">
                  <tr *ngFor="let qual of qualifications.controls; let i = index" [formGroupName]="i" class="table-row-animate">
                    <td><input type="text" formControlName="course_name" class="form-control form-control-sm grid-input" placeholder="e.g. SSLC"></td>
                    <td><input type="text" formControlName="year_of_pass" class="form-control form-control-sm grid-input text-center" placeholder="2024"></td>
                    <td><input type="number" formControlName="percentage" class="form-control form-control-sm grid-input text-center" placeholder="90"></td>
                    <td class="text-center">
                      <button type="button" class="btn btn-outline-danger btn-sm border-0 rounded-circle" (click)="removeQualification(i)">
                        <i class="bi bi-trash3"></i>
                      </button>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>

          <div class="text-center mt-5">
            <button type="submit" class="btn btn-primary btn-sm px-5 py-2 fw-bold rounded-pill shadow hover-lift">
              REGISTER NOW
            </button>
            <p class="mt-3 small text-muted">Already registered? <a routerLink="/login" class="text-primary fw-bold text-decoration-none">Sign In</a></p>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
